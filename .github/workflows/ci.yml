# ─────────────────────────────────────────────────────────────────────────────
# CI Workflow — runs on every pull request targeting main
#
# What this does: automatically lints, tests, audits, and builds the app
# whenever a PR is opened or updated. All four jobs run in parallel —
# the result appears on the PR before a human reviewer opens it.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

# Triggers — what causes this workflow to run
on:
  pull_request:
    branches: [main]   # fires when a PR targets main
  push:
    branches: [main]   # also runs on direct push (keeps the badge current)

# Concurrency control — if a new commit is pushed to the same PR while
# CI is still running, cancel the in-progress run and start fresh.
# You always see results for the latest code, never stale runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  # Runs RuboCop to enforce code style.
  # Catches formatting issues so reviewers can focus on logic, not style.
  lint:
    name: Lint (RuboCop)
    runs-on: ubuntu-latest   # GitHub-hosted runner — fresh VM, destroyed after

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # Marketplace action — clones the repo

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1    # Marketplace action — installs Ruby,
        with:                       # configures bundler, handles gem caching
          ruby-version: "3.2.3"
          bundler-cache: true       # caches gems between runs for speed

      - name: Run RuboCop
        run: bundle exec rubocop --format github   # shell command on the runner
        # --format github annotates violations directly on the PR diff

  # ── Job 2: Test ─────────────────────────────────────────────────────────────
  # Runs the full RSpec suite against a clean test database.
  # This is the gate — a failing test blocks the merge button entirely.
  test:
    name: Test (RSpec)
    runs-on: ubuntu-latest   # separate runner from lint — runs in parallel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.3"
          bundler-cache: true

      - name: Set up database
        run: |
          bundle exec rails db:create
          bundle exec rails db:migrate
        env:
          RAILS_ENV: test   # environment variables injected into the runner

      - name: Run RSpec
        run: |
          bundle exec rspec \
            --format documentation \
            --format RspecJunitFormatter \
            --out tmp/rspec-results.xml
        # --format documentation: prints each test name as it runs
        # RspecJunitFormatter: generates structured XML for the results artifact
        env:
          RAILS_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v4   # persists the XML beyond the job
        if: always()                       # runs even if tests failed
        with:
          name: rspec-test-results
          path: tmp/rspec-results.xml

      - name: Annotate test results on PR
        uses: dorny/test-reporter@v1       # reads JUnit XML and posts inline
        if: always()                       # annotations on the PR diff
        with:
          name: RSpec Results
          path: tmp/rspec-results.xml
          reporter: java-junit
          fail-on-error: false

  # ── Job 3: Security Audit ───────────────────────────────────────────────────
  # Checks all gems against the Ruby Advisory Database for known CVEs.
  # Catches dependency vulnerabilities before they reach production.
  # This is the kind of check that would have caught Log4Shell-style issues.
  security:
    name: Security audit
    runs-on: ubuntu-latest   # third separate runner — runs in parallel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.3"
          bundler-cache: true

      - name: Update advisory database
        run: bundle exec bundler-audit update
        # Downloads the latest known vulnerability advisories

      - name: Run security audit
        run: bundle exec bundler-audit check --format text
        # Fails the job if any gem has a known CVE — same exit code model
        # as RSpec: non-zero exit = job failure = merge blocked

  # ── Job 4: Build ────────────────────────────────────────────────────────────
  # Boots the Rails app in a clean environment to catch load-time errors.
  # Verifies the app starts successfully — independent of the test suite.
  build:
    name: Build check
    runs-on: ubuntu-latest   # fourth separate runner — all four jobs are parallel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.3"
          bundler-cache: true

      - name: Boot check
        run: |
          bundle exec rails db:create db:migrate
          bundle exec rails runner "puts 'Atlas Commerce boots successfully'"
        env:
          RAILS_ENV: test
          SECRET_KEY_BASE: "ci-placeholder-not-used-in-test"
