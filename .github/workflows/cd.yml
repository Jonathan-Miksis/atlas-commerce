name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      reason:
        description: "Reason for manual deploy (shown in audit trail)"
        required: false
        type: string

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://atlas-commerce-staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.3"
          bundler-cache: true

      - name: Show deploy context
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Atlas Commerce — Staging Deploy"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "  Trigger : ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "  Reason  : ${{ inputs.reason || 'Manual deploy' }}"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Deploy to staging
        run: |
          echo "Running database migrations..."
          echo "Deploying application..."
          echo "Restarting application server..."
          echo ""
          echo "✓ Atlas Commerce deployed to staging"
          echo "✓ Health check passed: GET /health → 200 OK"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    # Only deploy to production on push to main OR when manually targeting production
    if: github.event_name == 'push' || inputs.environment == 'production'
    environment:
      name: production
      url: https://atlas-commerce.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.3"
          bundler-cache: true

      - name: Show deploy context
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Atlas Commerce — Production Deploy"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "  Trigger : ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "  Reason  : ${{ inputs.reason || 'Manual deploy' }}"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Deploy to production
        run: |
          echo "Running database migrations..."
          echo "Deploying application..."
          echo "Restarting application server..."
          echo ""
          echo "✓ Atlas Commerce deployed to production"
          echo "✓ Health check passed: GET /health → 200 OK"

      - name: Tag release
        run: |
          echo "✓ Release tagged: v1.0.${{ github.run_number }}"
          echo "  SHA: ${{ github.sha }}"
          echo "  Deployed by: ${{ github.actor }}"
