# ─────────────────────────────────────────────────────────────────────────────
# CD Workflow — deploys Atlas Commerce after a merge to main
#
# Two deployment paths:
#   Automatic: merging to main triggers staging → then production (gated)
#   Manual:    the "Run workflow" button lets you deploy on demand, any time
#
# Staging deploys automatically. Production requires a human approval.
# Every deployment — automatic or manual — is logged with who, when, and why.
#
# Post-deploy health check runs after every deployment to verify the app
# came up cleanly. A failed health check fails the job and prevents the
# next environment from running.
# ─────────────────────────────────────────────────────────────────────────────

name: CD

on:
  push:
    branches: [main]        # automatic path — merge to main triggers this

  workflow_dispatch:        # manual path — adds a "Run workflow" button in the UI
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      reason:
        description: "Reason for manual deploy (appears in the audit log)"
        required: false
        type: string

jobs:

  # ── Job 1: Deploy to Staging ─────────────────────────────────────────────────
  # Runs automatically on every merge to main.
  # No approval required — staging is the safe testing ground.
  # Health check runs after deploy to verify the app came up cleanly.
  # If it fails, production deployment is blocked automatically.
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging                                      # named environment in GitHub
      url: https://atlas-commerce-staging.example.com   # shown in the deployment UI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.3"
          bundler-cache: true

      - name: Show deploy context
        # github context variables — automatically available in every workflow run
        # this is why the audit log captures commit, actor, and trigger for free
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Atlas Commerce — Staging Deploy"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "  Trigger : ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "  Reason  : ${{ inputs.reason || 'Manual deploy' }}"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Deploy to staging
        run: |
          echo "Running database migrations..."
          echo "Deploying application..."
          echo "Restarting application server..."
          echo ""
          echo "✓ Atlas Commerce deployed to staging"
        # In a real deployment: swap these echo commands for your actual
        # deploy steps — cap staging deploy, Heroku, Render, Fly.io, etc.

      - name: Health check — staging
        # Verifies the app came up cleanly after deployment.
        # A failed health check fails this job, which blocks production
        # from running via the needs: deploy-staging dependency.
        # In a real deployment: replace the URL with your actual staging endpoint.
        run: |
          echo "Verifying staging is healthy..."
          echo "GET https://atlas-commerce-staging.example.com/health"
          echo ""
          echo "  HTTP 200 OK"
          echo "  Response: { \"status\": \"ok\", \"version\": \"${{ github.sha }}\" }"
          echo ""
          echo "✓ Health check passed — staging is live and responding"
        # Real implementation:
        # run: |
        #   sleep 10  # give the server time to restart
        #   curl --fail --retry 3 --retry-delay 5 \
        #     https://atlas-commerce-staging.example.com/health

  # ── Job 2: Deploy to Production ──────────────────────────────────────────────
  # Runs after staging succeeds (needs: deploy-staging).
  # This means: staging deploy AND health check must both pass first.
  # GATED — requires a human reviewer to approve before the runner starts.
  # The approval, approver identity, and timestamp are logged automatically.
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging   # staging deploy + health check must pass first
    # Only runs on push to main OR when manually targeting production
    if: github.event_name == 'push' || inputs.environment == 'production'
    environment:
      name: production                              # protected environment
      url: https://atlas-commerce.example.com       # requires reviewer approval
      # Required reviewers are configured in Settings → Environments → production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.3"
          bundler-cache: true

      - name: Show deploy context
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Atlas Commerce — Production Deploy"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "  Trigger : ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "  Reason  : ${{ inputs.reason || 'Manual deploy' }}"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Deploy to production
        run: |
          echo "Running database migrations..."
          echo "Deploying application..."
          echo "Restarting application server..."
          echo ""
          echo "✓ Atlas Commerce deployed to production"

      - name: Health check — production
        # Same verification after production deploy.
        # If this fails, the deployment is marked failed in the activity log.
        run: |
          echo "Verifying production is healthy..."
          echo "GET https://atlas-commerce.example.com/health"
          echo ""
          echo "  HTTP 200 OK"
          echo "  Response: { \"status\": \"ok\", \"version\": \"${{ github.sha }}\" }"
          echo ""
          echo "✓ Health check passed — production is live and responding"

      - name: Tag release
        run: |
          echo "✓ Release tagged: v1.0.${{ github.run_number }}"
          echo "  SHA: ${{ github.sha }}"
          echo "  Deployed by: ${{ github.actor }}"
