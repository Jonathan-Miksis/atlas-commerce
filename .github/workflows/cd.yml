name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://atlas-commerce-staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.3"
          bundler-cache: true

      - name: Deploy to staging
        run: |
          echo "Deploying Atlas Commerce to staging..."
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Deployment complete ✓"

      - name: Smoke test staging
        run: |
          echo "Running smoke tests against staging..."
          echo "GET /health → 200 OK ✓"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://atlas-commerce.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying Atlas Commerce to production..."
          echo "Commit: ${{ github.sha }}"
          echo "Approved by: ${{ github.actor }}"
          echo "Deployment complete ✓"

      - name: Tag release
        run: |
          echo "Release tagged: v-${{ github.run_number }}-${{ github.sha }}"
