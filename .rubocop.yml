plugins:
  - rubocop-rails
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  Exclude:
    - 'db/schema.rb'
    - 'db/migrate/**/*'
    - 'bin/**/*'
    - 'config/boot.rb'
    - 'config/puma.rb'
    - 'node_modules/**/*'
    - 'vendor/**/*'

# ── Layout ───────────────────────────────────────────────────────────────────
Layout/LineLength:
  Enabled: false

Layout/ExtraSpacing:
  Enabled: false

Layout/FirstArrayElementIndentation:
  Enabled: false

# ── Style ─────────────────────────────────────────────────────────────────────
Style/StringLiterals:
  Enabled: false

Style/StringLiteralsInInterpolation:
  Enabled: false

Style/SymbolArray:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/NumericPredicate:
  Enabled: false

Style/RedundantFetchBlock:
  Enabled: false

Style/TrailingCommaInArrayLiteral:
  Enabled: false

Style/RedundantRegexpEscape:
  Enabled: false

# ── Lint ──────────────────────────────────────────────────────────────────────
Lint/AmbiguousOperatorPrecedence:
  Enabled: false

Lint/RedundantDirGlobSort:
  Enabled: false

# ── Metrics ───────────────────────────────────────────────────────────────────
Metrics/MethodLength:
  Max: 25
  Exclude:
    - 'spec/**/*'

Metrics/AbcSize:
  Max: 30
  Exclude:
    - 'spec/**/*'

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'config/routes.rb'

# ── Rails ─────────────────────────────────────────────────────────────────────
Rails/Output:
  Exclude:
    - 'db/seeds.rb'

Rails/I18nLocaleTexts:
  Enabled: false

Rails/ResponseParsedBody:
  Enabled: false

Rails/HttpStatusNameConsistency:
  Enabled: false

Rails/RootPathnameMethods:
  Enabled: false

# ── Bundler ───────────────────────────────────────────────────────────────────
Bundler/OrderedGems:
  Enabled: false

# ── RSpec ─────────────────────────────────────────────────────────────────────
RSpec/ImplicitExpect:
  Enabled: false

RSpec/DescribedClass:
  Enabled: false

RSpec/MultipleExpectations:
  Max: 5

RSpec/ExampleLength:
  Max: 20

RSpec/NestedGroups:
  Max: 4
